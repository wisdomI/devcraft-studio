<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nav Logo Export</title>
    <style>
      html,
      body {
        margin: 0;
        width: 256px;
        height: 256px;
      }
      body {
        display: grid;
        place-items: center;
        background: transparent;
      }
      .tile {
        width: 200px;
        height: 200px;
        border-radius: 32px;
        background: #1d4ed8;
        display: grid;
        place-items: center;
      }
      svg {
        width: 94px;
        height: 94px;
      }
    </style>
  </head>
  <body>
    <div class="tile">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M3 5l5-2 5 2v3.5c0 2.8-2.5 4.5-5 5.5-2.5-1-5-2.7-5-5.5V5z"
          stroke="white"
          stroke-width="1.4"
          fill="none"
        />
        <path d="M5.5 8l2 2 3-3.5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
  </body>
</html>
